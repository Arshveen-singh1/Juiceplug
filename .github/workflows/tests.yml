name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install with dev dependencies, but WITHOUT the [gpu] or [train] extras
        # since we want these to be CPU-only, dependency-light tests.
        pip install -e ".[dev]"
        
    - name: Run pytest
      run: |
        pytest tests/ -v
        
    - name: Run formatting check (black)
      run: |
        black --check juiceplug/ tests/ examples/
        
    - name: Run linting (ruff)
      run: |
        ruff check juiceplug/ tests/ examples/
